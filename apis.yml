aid: apache-servicemix
name: Apache ServiceMix
description: >-
  Apache ServiceMix is a flexible, open-source integration container that unifies the features and functionality of Apache ActiveMQ, Camel, CXF, and Karaf into a powerful runtime for building enterprise
  integration solutions.
